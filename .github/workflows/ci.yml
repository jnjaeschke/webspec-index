name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --verbose

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy -- -D warnings

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
      - name: Build release
        run: cargo build --release --verbose

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build
      - name: Query specs
        run: |
          for anchor in \
            "HTML#navigate" \
            "DOM#concept-tree" \
            "FETCH#concept-request" \
            "ECMA-262#sec-tostring" \
            "SELECTORS-4#specificity" \
            "CSS-DISPLAY-4#propdef-display" \
            "MEDIACAPTURE-MAIN#dom-mediatracksupportedconstraints-latency" \
            "WEBCODECS#dom-audiodecoder-configure" \
            "WEBGPU#textures" \
            "WGSL#textureload"
          do
            echo "Querying $anchor..."
            ./target/debug/webspec-index query "$anchor" | jq -e '.anchor' > /dev/null
          done

  extension:
    name: Build extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci
      - name: Compile TypeScript
        working-directory: editors/vscode
        run: npm run compile

  zed-extension:
    name: Build Zed extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: zed-extension
      - name: Run tests
        run: cargo test --manifest-path editors/zed/Cargo.toml --verbose
      - name: Run clippy
        run: cargo clippy --manifest-path editors/zed/Cargo.toml --target wasm32-wasip1 -- -D warnings
      - name: Build wasm extension
        run: cargo build --release --manifest-path editors/zed/Cargo.toml --target wasm32-wasip1 --verbose
